<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f7ff;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eff5ff 0%, #e2e8f0 100%);
    }

    .login-container {
      width: min(420px, calc(100% - 32px));
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      padding: 36px 32px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
      text-align: center;
    }

    .brand__title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0;
    }

    .brand__subtitle {
      margin: 0;
      color: #586b87;
      font-size: 0.96rem;
    }

    .form-group {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: #f8fafc;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      background: #ffffff;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: #3b82f6;
      color: #ffffff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .button:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .secondary {
      text-align: center;
      color: #475569;
      font-size: 0.95rem;
    }

    .secondary a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }

    .secondary a:hover {
      text-decoration: underline;
    }

    .helper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
      color: #64748b;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    .helper input[type="checkbox"] {
      accent-color: #3b82f6;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 0.88rem;
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 360px) {
      .login-container {
        padding: 28px 20px;
      }

      .brand__title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <main class="login-container" aria-label="Login form">
    <div class="brand">
      <h1 class="brand__title">Welcome Back</h1>
      <p class="brand__subtitle">Sign in to continue to your dashboard.</p>
    </div>

    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <div class="helper">
        <label>
          <input type="checkbox" name="remember" /> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <div class="actions">
        <button type="submit" class="button">Log In</button>
      </div>
    </form>

    <p class="secondary">
      New here? <a href="#">Create an account</a>
    </p>

    <p class="footer-note">Your credentials are secure and private. We use industry-standard encryption.</p>
  </main>
</body>
</html>
